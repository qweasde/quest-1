<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>Ознакомление</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body style="background-color: #350002;">
    <div class="text" style="margin-top: 20px;">
        <div class="header-text">
            <div class="container">
                <h1 style="margin: 0; font-size: 32px; font-family: 'Great Vibes'; font-weight: 200; color: #FFBABA;">
                    Мамуль, c днем рождения!
                </h1>
                <p style="margin-top: 10px; width: 300px; font-family: 'Great Vibes'; font-size: 20px; color: #fff;">
                    Ты - самая лучшая женщина на этой планете. Мы очень дорожим тобой и безумно тебя любим!
                </p>
                <img class="cloud" src="img/oblako.svg" alt="" srcset="">
            </div>
        </div>
    </div>

    <div class="audio-block">
        <div class="container">
            <div class="audio-btn-container">
                <div class="audio-btn">
                    <p>Прослушать голосовое</p>
                    <svg width="33" height="34" viewBox="0 0 33 34" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M23.4252 0H9.59128C3.58228 0 0 3.689 0 9.877V24.106C0 30.311 3.58228 34 9.59128 34H23.4087C29.4177 34 32.9999 30.311 32.9999 24.123V9.877C33.0165 3.689 29.4342 0 23.4252 0ZM20.8994 19.941L18.7864 21.199L16.6733 22.457C13.9495 24.072 11.7208 22.746 11.7208 19.516V17V14.484C11.7208 11.237 13.9495 9.928 16.6733 11.543L18.7864 12.801L20.8994 14.059C23.6233 15.674 23.6233 18.326 20.8994 19.941Z" fill="#350002"/>
                    </svg>
                </div>
                <audio id="voice-audio" src="audio/message.ogg"></audio>
            </div>
        </div>
    </div>

    <div class="quest-block-hello">
        <div class="container">
            <div class="quest-block-content">
                <h1>Я подтверждаю, что я:</h1>
                <form class="checkbox-form">
                    <label class="custom-checkbox">
                        <input type="checkbox" name="q1" />
                        <span class="checkmark"></span>
                        Являюсь самой красивой, умной и любимой женщиной
                    </label>

                    <label class="custom-checkbox">
                        <input type="checkbox" name="q2" />
                        <span class="checkmark"></span>
                        У меня самые прекрасные муж и дети
                    </label>

                    <label class="custom-checkbox">
                        <input type="checkbox" name="q3" />
                        <span class="checkmark"></span>
                        Я готова отправиться на поиски сокровищ
                    </label>

                    <label class="custom-checkbox">
                        <input type="checkbox" name="q4" />
                        <span class="checkmark"></span>
                        Я — лучшая мама на свете
                    </label>

                    <div class="ready-btn">
                        <button type="button">
                            Я готова
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Блок квиза (скрыт по умолчанию) -->
    <div class="quest-block-quiz" style="display: none;">
        <div class="container">
            <div class="quiz-content">
                <h1>Загадка:</h1>
                <p>Вопрос</p>
                <form id="quiz-form">
                    <label>
                        <input type="radio" name="quiz-answer" value="A" />
                        Вариант A
                    </label>
                    <label>
                        <input type="radio" name="quiz-answer" value="B" />
                        Вариант B
                    </label>
                    <label>
                        <input type="radio" name="quiz-answer" value="C" />
                        Вариант C
                    </label>
                </form>
                <div class="btn-container">
                    <div class="submit-btn">
                        <button type="button" id="quiz-submit">Отправить</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="quiz-overlay" style="display: none;">
        <div class="quiz-popup">
            <div class="popup-content">
                <p>Ты большая умничка! 🎉 <br>
                Ответ: Холодильник.</p>
                <button class="close-popup">Закрыть</button>
            </div>
        </div>
    </div>

    <div class="steps">
        <div class="container">
            <div class="steps-content">
                <p>Шаг 1 из 5</p>
                <img src="img/1-5.svg" alt="">
            </div>
        </div>
        <img class="bouquet" src="img/bouquet.png" alt="">
    </div>
</div>
    

    
</body>
<script src="script.js"></script>
</html>
